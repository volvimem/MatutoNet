<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatutoNet - Gestão de Provedor</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>📡 MatutoNet</h1>
        <nav>
            <button onclick="mostrarSessao('dashboard')">📊 Painel Geral</button>
            <button onclick="mostrarSessao('clientes')">👥 Clientes</button>
            <button onclick="mostrarSessao('custos')">💰 Custos</button>
        </nav>
    </header>

    <main>
        <section id="dashboard" class="sessao">
            <h2>Resumo Financeiro</h2>
            <div class="grafico-container" style="max-width: 600px; margin: auto;">
                <canvas id="graficoFinanceiro"></canvas>
            </div>
        </section>

        <section id="clientes" class="sessao" style="display: none;">
            <h2>Cadastrar Novo Cliente</h2>
            <form id="formNovoCliente" class="formulario">
                <input type="text" id="nomeCliente" placeholder="Nome Completo" required>
                
                <input type="text" id="cpfCliente" placeholder="CPF (Apenas números)" maxlength="14" required>
                <input type="text" id="telCliente" placeholder="WhatsApp: (XX) X XXXX-XXXX" maxlength="15" required>
                <input type="text" id="bairroCliente" placeholder="Bairro" required>
                <input type="text" id="cidadeCliente" placeholder="Cidade" required>
                <input type="number" id="vencimentoCliente" placeholder="Dia do Vencimento (Ex: 10)" min="1" max="31" required>
                <input type="text" id="planoCliente" placeholder="Plano (Ex: 100 Mega)" required>
                
                <input type="url" id="linkMaps" placeholder="Link do Google Maps (Opcional)">
                
                <button type="submit">Salvar Cliente</button>
            </form>

            <hr>

            <h2>Lista de Clientes</h2>
            <div id="listaClientes" class="lista-grid">
                </div>
        </section>

        <section id="custos" class="sessao" style="display: none;">
            <h2>Lançar Custo</h2>
            <form id="formCusto" class="formulario">
                <input type="text" id="descCusto" placeholder="Descrição do Custo (Ex: Roteador, Combustível)" required>
                <input type="number" id="valorCusto" placeholder="Valor (R$)" step="0.01" required>
                <select id="tipoCusto" required>
                    <option value="" disabled selected>Selecione o Tipo...</option>
                    <option value="produto">Produto</option>
                    <option value="servico">Serviço</option>
                </select>
                <button type="submit">Salvar Custo</button>
            </form>
            
            <hr>
            
            <h2>Histórico de Custos</h2>
            <div id="listaCustos" class="lista-grid">
                </div>
        </section>
    </main>

    <script>
        function mostrarSessao(idSessao) {
            document.querySelectorAll('.sessao').forEach(sessao => {
                sessao.style.display = 'none';
            });
            document.getElementById(idSessao).style.display = 'block';
        }
    </script>
    <script type="module" src="app.js"></script>

</body>
</html>
