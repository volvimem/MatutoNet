<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatutoNet - Gestão de Provedor</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>📡 MatutoNet</h1>
        <nav>
            <button onclick="mostrarSessao('dashboard')">📊 Dashboard</button>
            <button onclick="mostrarSessao('clientes')">👥 Clientes</button>
            <button onclick="mostrarSessao('custos')">💰 Custos</button>
        </nav>
    </header>

    <main>
        <section id="dashboard" class="sessao">
            <h2>Controle Financeiro</h2>
            <div class="grafico-container" style="max-width: 600px; margin: auto;">
                <canvas id="graficoFinanceiro"></canvas>
            </div>
        </section>

        <section id="clientes" class="sessao" style="display: none;">
            <h2>Cadastrar Novo Cliente</h2>
            <form id="formNovoCliente" class="formulario">
                <input type="text" id="nomeCliente" placeholder="Nome do Cliente" required>
                <input type="text" id="planoCliente" placeholder="Plano (Ex: 100 Mega)" required>
                <input type="url" id="linkMaps" placeholder="Cole o link do Google Maps" required>
                <button type="submit">Salvar Cliente</button>
            </form>

            <hr>

            <h2>Lista de Clientes</h2>
            <div id="listaClientes" class="lista-grid">
                </div>
        </section>

        <section id="custos" class="sessao" style="display: none;">
            <h2>Lançar Custo</h2>
            <form id="formCusto" class="formulario">
                <input type="text" id="descCusto" placeholder="Descrição do Custo (Ex: Roteador, Combustível)" required>
                <input type="number" id="valorCusto" placeholder="Valor (R$)" step="0.01" required>
                <select id="tipoCusto" required>
                    <option value="" disabled selected>Selecione o Tipo...</option>
                    <option value="produto">Produto</option>
                    <option value="servico">Serviço</option>
                </select>
                <button type="submit">Salvar Custo</button>
            </form>
        </section>
    </main>

    <button id="btnNovoAgendamento" class="btn-flutuante" title="Novo Agendamento">+</button>

    <div id="modalAgendamento" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="fecharModal" class="close">&times;</span>
            <h2>Novo Agendamento</h2>
            <form id="formAgendamento" class="formulario">
                <input type="text" id="tituloAgendamento" placeholder="Ex: Instalação Cliente X" required>
                <input type="datetime-local" id="dataAgendamento" required>
                <button type="submit">Agendar</button>
            </form>
        </div>
    </div>

    <script>
        // Função para alternar entre as abas do menu
        function mostrarSessao(idSessao) {
            document.querySelectorAll('.sessao').forEach(sessao => {
                sessao.style.display = 'none'; // Esconde todas
            });
            document.getElementById(idSessao).style.display = 'block'; // Mostra a clicada
        }

        // Lógica do botão + (Abrir/Fechar Modal)
        const modal = document.getElementById('modalAgendamento');
        document.getElementById('btnNovoAgendamento').addEventListener('click', () => {
            modal.style.display = 'block';
        });
        document.getElementById('fecharModal').addEventListener('click', () => {
            modal.style.display = 'none';
        });
        // Fecha o modal se clicar fora dele
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

    <script type="module" src="app.js"></script>

</body>
</html>
