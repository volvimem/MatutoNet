<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatutoNet - Gestão de Provedor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>📡 MatutoNet</h1>
        <nav>
            <button onclick="mostrarSessao('dashboard')">📊 Painel Geral</button>
            <button onclick="mostrarSessao('clientes')">👥 Clientes</button>
            <button onclick="mostrarSessao('custos')">💰 Custos</button>
        </nav>
    </header>

    <main>
        <section id="dashboard" class="sessao">
            <h2>Resumo Financeiro</h2>
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; border-left: 5px solid #10b981;">
                    <h3>Receita Esperada</h3>
                    <p id="totalReceita" style="font-size: 24px; font-weight: bold;">R$ 0,00</p>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; border-left: 5px solid #ef4444;">
                    <h3>Custos Totais</h3>
                    <p id="totalCustos" style="font-size: 24px; font-weight: bold;">R$ 0,00</p>
                </div>
            </div>
            <div class="grafico-container" style="background: white; padding: 20px; border-radius: 10px;">
                <canvas id="graficoFinanceiro"></canvas>
            </div>
        </section>

        <section id="clientes" class="sessao" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Lista de Clientes</h2>
                <button onclick="abrirModalCliente()" style="background: #3b82f6; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;"><i class="fas fa-plus"></i> Novo Cliente</button>
            </div>
            
            <div id="listaClientes" class="lista-grid"></div>
        </section>

        <section id="custos" class="sessao" style="display: none;">
            <h2>Lançar Novo Custo</h2>
            <form id="formCusto" class="formulario">
                <input type="text" id="descCusto" placeholder="Descrição do Custo" required>
                <input type="number" id="valorCusto" placeholder="Valor (R$)" step="0.01" required>
                <select id="tipoCusto" required>
                    <option value="" disabled selected>Selecione o Tipo...</option>
                    <option value="produto">Produto</option>
                    <option value="servico">Serviço</option>
                </select>
                <button type="submit">Salvar Custo</button>
            </form>
            <hr>
            <h2>Histórico de Custos</h2>
            <div id="listaCustos" class="lista-grid"></div>
        </section>
    </main>

    <div id="modalCliente" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="fecharModalCliente()">&times;</span>
            <h2 id="tituloModalCliente">Cadastrar Cliente</h2>
            <form id="formNovoCliente" class="formulario" style="box-shadow: none; padding: 0;">
                <input type="text" id="nomeCliente" placeholder="Nome Completo" required>
                <input type="text" id="cpfCliente" placeholder="CPF" maxlength="14" required>
                <input type="text" id="telCliente" placeholder="WhatsApp" maxlength="15" required>
                <input type="text" id="bairroCliente" placeholder="Bairro" required>
                <input type="text" id="cidadeCliente" placeholder="Cidade" required>
                <input type="number" id="vencimentoCliente" placeholder="Dia Vencimento" required>
                <input type="number" id="planoCliente" placeholder="Valor do Plano (Ex: 89.90)" step="0.01" required>
                <button type="submit" style="grid-column: span 2;">Salvar Cliente</button>
            </form>
        </div>
    </div>

    <script>
        function mostrarSessao(idSessao) {
            document.querySelectorAll('.sessao').forEach(sessao => sessao.style.display = 'none');
            document.getElementById(idSessao).style.display = 'block';
        }
        function abrirModalCliente() { document.getElementById('modalCliente').style.display = 'block'; }
        function fecharModalCliente() { document.getElementById('modalCliente').style.display = 'none'; }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
